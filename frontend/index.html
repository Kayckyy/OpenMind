<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>OpenMind</title>
  <style>
    * { box-sizing: border-box; margin: 0; padding: 0; }
    body { font-family: sans-serif; background: #111; color: #eee; padding: 24px; }
    h1 { margin-bottom: 8px; font-size: 1.4rem; }
    .subtitle { color: #666; font-size: 0.8rem; margin-bottom: 24px; }
    .section { margin-bottom: 20px; }
    .section-title { font-size: 0.75rem; color: #555; text-transform: uppercase;
                     letter-spacing: 1px; margin-bottom: 8px; }
    .search-row { display: flex; gap: 8px; }
    .search-row input {
      flex: 1; padding: 10px 12px; background: #1e1e1e;
      border: 1px solid #333; border-radius: 8px; color: #eee; font-size: 0.95rem;
    }
    .search-row button {
      padding: 10px 16px; background: #7c3aed; color: white;
      border: none; border-radius: 8px; cursor: pointer; font-size: 0.95rem;
    }
    .divider { text-align: center; color: #444; margin: 12px 0; font-size: 0.85rem; }
    input[type=file] { color: #aaa; font-size: 0.9rem; }
    .group { margin-bottom: 12px; }
    label { display: block; margin-bottom: 4px; font-size: 0.82rem; color: #888; }
    input[type=range] { width: 100%; accent-color: #7c3aed; }
    .buttons { display: flex; gap: 8px; margin-top: 16px; }
    button.primary {
      flex: 1; padding: 12px; background: #7c3aed; color: white;
      border: none; border-radius: 8px; font-size: 1rem; cursor: pointer;
    }
    button.secondary {
      flex: 1; padding: 12px; background: #222; color: #aaa;
      border: 1px solid #333; border-radius: 8px; font-size: 1rem; cursor: pointer;
    }
    button:disabled { opacity: 0.4; cursor: not-allowed; }
    #status {
      margin-top: 12px; font-size: 0.85rem; color: #7c3aed;
      min-height: 20px; text-align: center;
    }
  </style>
</head>
<body>
  <h1>OpenMind</h1>
  <p class="subtitle">Open spatial audio — everywhere</p>

  <div class="section">
    <div class="section-title">YouTube</div>
    <div class="search-row">
      <input type="text" id="ytQuery" placeholder="Search or paste YouTube URL...">
      <button onclick="startYoutube()">▶</button>
    </div>
  </div>

  <div class="divider">or</div>

  <div class="section">
    <div class="section-title">Local file</div>
    <input type="file" id="file" accept=".wav,.mp3,.flac">
    <div class="buttons">
      <button class="primary" id="btnPlay" onclick="startStream()">▶ Play</button>
      <button class="secondary" id="btnStop" onclick="stopStream()" disabled>■ Stop</button>
    </div>
  </div>

  <div class="section">
    <div class="section-title">Spatial controls</div>
    <div class="group">
      <label>Azimuth L: <span id="az_l_val">90°</span></label>
      <input type="range" id="az_l" min="0" max="360" value="90"
        oninput="document.getElementById('az_l_val').textContent = this.value + '°'">
    </div>
    <div class="group">
      <label>Azimuth R: <span id="az_r_val">270°</span></label>
      <input type="range" id="az_r" min="0" max="360" value="270"
        oninput="document.getElementById('az_r_val').textContent = this.value + '°'">
    </div>
    <div class="group">
      <label>Elevation L: <span id="el_l_val">0°</span></label>
      <input type="range" id="el_l" min="-90" max="90" value="0"
        oninput="document.getElementById('el_l_val').textContent = this.value + '°'">
    </div>
    <div class="group">
      <label>Elevation R: <span id="el_r_val">0°</span></label>
      <input type="range" id="el_r" min="-90" max="90" value="0"
        oninput="document.getElementById('el_r_val').textContent = this.value + '°'">
    </div>
  </div>

  <div id="status"></div>

  <script>
    let worker = null;
let audioCtx = null;
let nextTime = 0;
const SR = 44100;

function setStatus(msg) {
  document.getElementById('status').textContent = msg;
}

function getParams() {
  return {
    az_l: document.getElementById('az_l').value,
    el_l: document.getElementById('el_l').value,
    az_r: document.getElementById('az_r').value,
    el_r: document.getElementById('el_r').value,
  };
}

function initAudio() {
  audioCtx = new AudioContext({ sampleRate: SR });
  nextTime = audioCtx.currentTime + 0.2;
}

function handleChunk(buffer) {
  const samples = new Float32Array(buffer);
  const frameCount = samples.length / 2;
  const audioBuf = audioCtx.createBuffer(2, frameCount, SR);
  const outL = audioBuf.getChannelData(0);
  const outR = audioBuf.getChannelData(1);

  for (let i = 0; i < frameCount; i++) {
    outL[i] = samples[i * 2];
    outR[i] = samples[i * 2 + 1];
  }

  const source = audioCtx.createBufferSource();
  source.buffer = audioBuf;
  source.connect(audioCtx.destination);

  const when = Math.max(nextTime, audioCtx.currentTime + 0.05);
  source.start(when);
  nextTime = when + audioBuf.duration;
}

function stopStream() {
  if (worker) { worker.postMessage({ type: 'stop' }); worker = null; }
  if (audioCtx) { audioCtx.close(); audioCtx = null; }
  document.getElementById('btnPlay').disabled = false;
  document.getElementById('btnStop').disabled = true;
  setStatus('');
}

// ── YouTube ──────────────────────────────────────────

async function startYoutube() {
  const query = document.getElementById('ytQuery').value.trim();
  if (!query) { alert('Enter a search term or YouTube URL'); return; }

  stopStream();
  initAudio();

  const host = window.location.hostname;
  worker = new Worker('worker.js');

  worker.onmessage = (e) => {
    const { type, msg, buffer } = e.data;
    if (type === 'status') setStatus(msg);
    if (type === 'chunk')  handleChunk(buffer);
    if (type === 'done')   { setStatus('Done.'); stopStream(); }
    if (type === 'error')  setStatus('Connection error.');
  };

  worker.postMessage({
    type: 'start_youtube',
    payload: {
      wsUrl: `ws://${host}:8000/stream/youtube`,
      params: { query, ...getParams() },
    }
  });

  document.getElementById('btnStop').disabled = false;
}

// ── Local file ───────────────────────────────────────

async function startStream() {
  const file = document.getElementById('file').files[0];
  if (!file) { alert('Select a file first'); return; }

  stopStream();
  initAudio();

  document.getElementById('btnPlay').disabled = true;
  document.getElementById('btnStop').disabled = false;

  const arrayBuffer = await file.arrayBuffer();
  const decoded = await audioCtx.decodeAudioData(arrayBuffer);

  const left  = decoded.getChannelData(0).buffer.slice(0);
  const right = decoded.numberOfChannels > 1
    ? decoded.getChannelData(1).buffer.slice(0)
    : left;

  const host = window.location.hostname;
  worker = new Worker('worker.js');

  worker.onmessage = (e) => {
    const { type, msg, buffer } = e.data;
    if (type === 'status') setStatus(msg);
    if (type === 'chunk')  handleChunk(buffer);
    if (type === 'done')   { setStatus('Done.'); stopStream(); }
    if (type === 'error')  setStatus('Connection error.');
  };

  worker.postMessage({
    type: 'start',
    payload: {
      wsUrl: `ws://${host}:8000/stream`,
      params: getParams(),
      audioData: { left, right },
      sampleRate: SR,
    }
  }, [left, right]);

  setStatus('Streaming...');
}
  </script>
</body>
</html>
